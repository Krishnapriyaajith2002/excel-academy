<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExcelForge — Data Analyst Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060a14;
  --surface: #0d1424;
  --surface2: #131d30;
  --surface3: #1a2540;
  --border: #1e2d47;
  --border2: #253550;
  --accent: #00e5c3;
  --accent-dim: rgba(0,229,195,0.12);
  --blue: #4f8ef7;
  --blue-dim: rgba(79,142,247,0.12);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --rose: #f43f5e;
  --rose-dim: rgba(244,63,94,0.12);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --green: #22c55e;
  --text: #dde4f0;
  --text2: #8fa3c4;
  --text3: #4a6080;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--body);display:flex;flex-direction:column;}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,195,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,195,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

/* TOP NAV */
.topnav{
  display:flex;align-items:center;gap:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;position:relative;z-index:10;flex-shrink:0;
}
.logo{font-family:var(--display);font-weight:800;font-size:20px;color:var(--accent);letter-spacing:-0.5px;margin-right:32px;white-space:nowrap;}
.logo em{color:var(--text);font-style:normal;}
.topnav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;}
.topnav-tabs::-webkit-scrollbar{height:0;}
.tab-btn{
  display:flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-family:var(--body);font-size:13px;font-weight:500;
  white-space:nowrap;transition:all 0.18s;
}
.tab-btn:hover{background:var(--surface2);color:var(--text);}
.tab-btn.active{background:var(--accent-dim);color:var(--accent);}
.tab-btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:0.7;}
.topnav-right{display:flex;align-items:center;gap:12px;margin-left:auto;padding-left:16px;}
.xp-badge{
  font-family:var(--mono);font-size:11px;
  background:var(--amber-dim);color:var(--amber);
  border:1px solid rgba(245,166,35,0.25);
  padding:4px 10px;border-radius:20px;
}
.streak-badge{
  font-family:var(--mono);font-size:11px;
  background:var(--rose-dim);color:var(--rose);
  border:1px solid rgba(244,63,94,0.25);
  padding:4px 10px;border-radius:20px;
}

/* MAIN LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{
  width:260px;min-width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-search{padding:12px 14px;border-bottom:1px solid var(--border);}
.sidebar-search input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;color:var(--text);font-family:var(--body);font-size:13px;
  outline:none;
}
.sidebar-search input::placeholder{color:var(--text3);}
.sidebar-search input:focus{border-color:var(--accent);}
.sidebar-list{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-list::-webkit-scrollbar{width:3px;}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border);}
.section-label{
  padding:10px 16px 4px;
  font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;
}
.lesson-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;transition:all 0.15s;
  border-left:2px solid transparent;font-size:13px;color:var(--text2);
}
.lesson-item:hover{background:var(--surface2);color:var(--text);}
.lesson-item.active{background:var(--accent-dim);border-left-color:var(--accent);color:var(--accent);}
.lesson-item.done{color:var(--green);}
.lesson-item .li-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.lesson-item .li-check{margin-left:auto;font-size:11px;color:var(--green);}
.lesson-item .li-lock{margin-left:auto;font-size:11px;color:var(--text3);}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* LESSON PANEL */
.lesson-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.lesson-header{
  padding:20px 28px 16px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.lesson-breadcrumb{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:6px;}
.lesson-title{font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);}
.lesson-meta{display:flex;gap:12px;margin-top:8px;}
.meta-pill{
  font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;
}
.pill-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(79,142,247,0.2);}
.pill-green{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.pill-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,0.2);}

.lesson-body{flex:1;overflow-y:auto;padding:24px 28px;}
.lesson-body::-webkit-scrollbar{width:4px;}
.lesson-body::-webkit-scrollbar-thumb{background:var(--border);}

/* Content blocks */
.content-section{margin-bottom:28px;}
.content-section h3{font-family:var(--display);font-size:16px;font-weight:700;color:var(--accent);margin-bottom:10px;}
.content-section p{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:10px;}
.content-section ul{font-size:14px;color:var(--text2);line-height:1.9;padding-left:18px;}

/* Formula block */
.formula-block{
  background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--accent);
  border-radius:8px;padding:14px 18px;margin:14px 0;
  font-family:var(--mono);font-size:13px;color:var(--accent);
  position:relative;
}
.formula-block .fb-label{
  position:absolute;top:-9px;left:14px;
  background:var(--surface2);padding:0 6px;
  font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;
}

/* Example table */
.excel-table{
  width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;
  margin:14px 0;border-radius:8px;overflow:hidden;border:1px solid var(--border);
}
.excel-table th{
  background:var(--surface3);color:var(--text2);font-weight:600;
  padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);
}
.excel-table td{
  padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);
  background:var(--surface2);
}
.excel-table tr:last-child td{border-bottom:none;}
.excel-table td.highlight{color:var(--accent);font-weight:500;}
.excel-table td.formula{color:var(--blue);}
.excel-table th:first-child,.excel-table td:first-child{
  background:var(--surface3);color:var(--text3);font-size:11px;width:40px;text-align:center;
}

/* TIP box */
.tip-box{
  background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2);border-radius:8px;
  padding:12px 16px;margin:14px 0;font-size:13px;color:var(--text2);
  display:flex;gap:10px;align-items:flex-start;
}
.tip-box .tip-icon{color:var(--amber);font-size:16px;flex-shrink:0;margin-top:1px;}

/* PRACTICE SECTION */
.practice-panel{
  border-top:1px solid var(--border);background:var(--surface);
  flex-shrink:0;
}
.practice-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 28px;border-bottom:1px solid var(--border);cursor:pointer;
}
.practice-header-left{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;}
.practice-toggle{font-family:var(--mono);font-size:11px;color:var(--text3);}
.practice-body{padding:16px 28px;display:none;}
.practice-body.open{display:block;}

.quiz-question{font-size:14px;color:var(--text);margin-bottom:14px;line-height:1.6;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.quiz-opt{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;cursor:pointer;font-family:var(--mono);font-size:12.5px;
  color:var(--text2);transition:all 0.15s;text-align:left;
}
.quiz-opt:hover{border-color:var(--blue);color:var(--text);background:var(--blue-dim);}
.quiz-opt.correct{border-color:var(--green);background:rgba(34,197,94,0.1);color:var(--green);}
.quiz-opt.wrong{border-color:var(--rose);background:var(--rose-dim);color:var(--rose);}

.formula-input-wrap{display:flex;gap:10px;margin-bottom:12px;}
.formula-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--accent);font-family:var(--mono);font-size:13px;outline:none;
}
.formula-input:focus{border-color:var(--accent);}
.formula-input::placeholder{color:var(--text3);}

.btn{
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  font-family:var(--body);font-size:13px;font-weight:600;transition:all 0.15s;
}
.btn-accent{background:var(--accent);color:var(--bg);}
.btn-accent:hover{opacity:0.9;transform:translateY(-1px);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

.result-box{
  padding:10px 14px;border-radius:8px;font-family:var(--mono);font-size:13px;
  margin-top:8px;display:none;
}
.result-box.show{display:block;}
.result-box.ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:var(--green);}
.result-box.fail{background:var(--rose-dim);border:1px solid rgba(244,63,94,0.25);color:var(--rose);}

/* AI TUTOR PANEL */
.ai-panel{
  width:320px;min-width:320px;
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.ai-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.ai-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.ai-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);}
.ai-status{font-family:var(--mono);font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;}
.ai-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);}

.ai-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.ai-messages::-webkit-scrollbar{width:3px;}
.ai-messages::-webkit-scrollbar-thumb{background:var(--border);}

.msg{max-width:90%;font-size:13px;line-height:1.6;}
.msg-ai{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px 12px 12px 12px;padding:10px 13px;color:var(--text2);
  align-self:flex-start;
}
.msg-user{
  background:var(--accent-dim);border:1px solid rgba(0,229,195,0.2);
  border-radius:12px 4px 12px 12px;padding:10px 13px;color:var(--accent);
  align-self:flex-end;font-family:var(--mono);
}
.msg-ai code{
  background:var(--surface3);color:var(--accent);
  font-family:var(--mono);padding:1px 5px;border-radius:3px;font-size:12px;
}
.msg-ai b{color:var(--text);font-weight:600;}
.msg-typing{
  display:flex;gap:5px;align-items:center;padding:10px 13px;
  background:var(--surface2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;
  align-self:flex-start;
}
.msg-typing span{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite;}
.msg-typing span:nth-child(2){animation-delay:0.2s;}
.msg-typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.3;}40%{opacity:1;}}

.ai-input-area{padding:12px 14px;border-top:1px solid var(--border);}
.ai-input-row{display:flex;gap:8px;}
.ai-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--text);font-family:var(--body);font-size:13px;outline:none;
  resize:none;
}
.ai-input:focus{border-color:var(--accent);}
.ai-input::placeholder{color:var(--text3);}
.ai-send{
  background:var(--accent);color:var(--bg);border:none;border-radius:8px;
  width:36px;height:36px;cursor:pointer;font-size:16px;transition:all 0.15s;flex-shrink:0;
}
.ai-send:hover{opacity:0.85;}
.ai-hints{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.hint-btn{
  font-size:11px;font-family:var(--mono);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);padding:4px 10px;border-radius:20px;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);}

/* PROGRESS TRACKER */
.progress-panel{padding:16px;border-top:1px solid var(--border);}
.progress-label-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:7px;}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:3px;transition:width 0.5s ease;}

/* Sheet simulator */
.sheet-wrap{overflow-x:auto;margin:14px 0;}
.sheet-table{border-collapse:collapse;font-family:var(--mono);font-size:12px;}
.sheet-table th{
  background:var(--surface3);color:var(--text3);padding:5px 14px;
  border:1px solid var(--border);font-weight:500;min-width:90px;text-align:center;
}
.sheet-table th:first-child{min-width:36px;}
.sheet-table td{
  padding:5px 14px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);min-width:90px;
  cursor:default;
}
.sheet-table td:first-child{background:var(--surface3);color:var(--text3);text-align:center;}
.sheet-table td.selected{background:rgba(0,229,195,0.08);border-color:var(--accent);}
.sheet-table td.formula-cell{color:var(--blue);}

/* animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadeIn 0.3s ease forwards;}

/* scrollbars */
.lesson-body::-webkit-scrollbar{width:4px;}
.lesson-body::-webkit-scrollbar-track{background:transparent;}
.lesson-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Responsive hide AI on smaller */
@media(max-width:1100px){.ai-panel{display:none;}}
@media(max-width:780px){.sidebar{display:none;}}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo">Excel<em>Forge</em></div>
  <div class="topnav-tabs" id="topTabs">
    <button class="tab-btn active" onclick="switchTab(this,'basics')" ><span class="dot" style="background:#22c55e"></span>Basics</button>
    <button class="tab-btn" onclick="switchTab(this,'functions')"><span class="dot" style="background:#4f8ef7"></span>Functions</button>
    <button class="tab-btn" onclick="switchTab(this,'lookup')"><span class="dot" style="background:#a855f7"></span>Lookups</button>
    <button class="tab-btn" onclick="switchTab(this,'logical')"><span class="dot" style="background:#f5a623"></span>Logical</button>
    <button class="tab-btn" onclick="switchTab(this,'datetime')"><span class="dot" style="background:#00e5c3"></span>Date &amp; Time</button>
    <button class="tab-btn" onclick="switchTab(this,'cleaning')"><span class="dot" style="background:#f43f5e"></span>Data Cleaning</button>
    <button class="tab-btn" onclick="switchTab(this,'pivot')"><span class="dot" style="background:#fb923c"></span>Pivot Tables</button>
    <button class="tab-btn" onclick="switchTab(this,'charts')"><span class="dot" style="background:#e879f9"></span>Charts &amp; Viz</button>
    <button class="tab-btn" onclick="switchTab(this,'powerquery')"><span class="dot" style="background:#38bdf8"></span>Power Query</button>
    <button class="tab-btn" onclick="switchTab(this,'vba')"><span class="dot" style="background:#f43f5e"></span>VBA &amp; Macros</button>
    <button class="tab-btn" onclick="switchTab(this,'projects')"><span class="dot" style="background:#fbbf24"></span>Real Projects</button>
  </div>
  <div class="topnav-right">
    <span class="xp-badge" id="xpBadge">⚡ 0 XP</span>
    <span class="streak-badge" id="streakBadge">🔥 0 streak</span>
  </div>
</nav>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" placeholder="🔍  Search lessons…" id="searchInput" oninput="filterLessons(this.value)">
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="progress-panel">
      <div class="progress-label-row"><span>Overall Progress</span><span id="progressPct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="lesson-panel">
      <div class="lesson-header" id="lessonHeader">
        <div class="lesson-breadcrumb" id="lessonBreadcrumb">Basics → Getting Started</div>
        <div class="lesson-title" id="lessonTitle">Welcome to ExcelForge</div>
        <div class="lesson-meta" id="lessonMeta">
          <span class="meta-pill pill-blue">Beginner</span>
          <span class="meta-pill pill-green">~5 min</span>
        </div>
      </div>
      <div class="lesson-body" id="lessonBody"></div>

      <!-- PRACTICE -->
      <div class="practice-panel">
        <div class="practice-header" onclick="togglePractice()">
          <div class="practice-header-left">⚡ Practice Exercise</div>
          <div class="practice-toggle" id="practiceToggle">▲ OPEN</div>
        </div>
        <div class="practice-body" id="practiceBody"></div>
      </div>
    </div>
  </main>

  <!-- AI TUTOR -->
  <aside class="ai-panel">
    <div class="ai-header">
      <div class="ai-avatar">🤖</div>
      <div>
        <div class="ai-name">Excel AI Tutor</div>
        <div class="ai-status">Online</div>
      </div>
    </div>
    <div class="ai-messages" id="aiMessages"></div>
    <div class="ai-input-area">
      <div class="ai-input-row">
        <textarea class="ai-input" id="aiInput" rows="2" placeholder="Ask anything about Excel…" onkeydown="handleAiKey(event)"></textarea>
        <button class="ai-send" onclick="sendAiMessage()">➤</button>
      </div>
      <div class="ai-hints" id="aiHints"></div>
    </div>
  </aside>
</div>

<script>
// ─── STATE ───
let xp = 0, streak = 0, completedLessons = new Set();
let currentLesson = null, practiceOpen = false;

// ─── CURRICULUM DATA ───
const curriculum = {
  basics: {
    label: "📗 Basics",
    color: "#22c55e",
    lessons: [
      { id:"b1", title:"Excel Interface Tour", time:"3 min", level:"Beginner",
        theory:`<div class="content-section"><h3>🖥️ The Excel Interface</h3>
          <p>Excel is organized around a <b>workbook</b> — a file that contains one or more <b>worksheets</b>. Each sheet is a grid of <b>cells</b> referenced by column (A, B, C…) and row (1, 2, 3…).</p>
          <ul><li><b>Ribbon</b> — tabs like Home, Insert, Formulas, Data</li>
          <li><b>Name Box</b> — shows the active cell (e.g. A1)</li>
          <li><b>Formula Bar</b> — shows/edit cell content</li>
          <li><b>Cell Range</b> — e.g. A1:D10 means from A1 to D10</li></ul>
          </div>
          <div class="content-section"><h3>📍 Cell References</h3>
          <p>Three types of references:</p>
          <div class="formula-block"><div class="fb-label">RELATIVE</div>=A1+B1 → moves with copy</div>
          <div class="formula-block"><div class="fb-label">ABSOLUTE</div>=$A$1+$B$1 → stays fixed (use F4)</div>
          <div class="formula-block"><div class="fb-label">MIXED</div>=$A1 or =A$1 → one part fixed</div>
          <div class="tip-box"><div class="tip-icon">💡</div>Press <b>F4</b> while editing a cell reference to toggle between absolute and relative.</div>
          </div>`,
        practice:{ type:"quiz", q:"Which reference stays fixed when you copy a formula to another cell?",
          opts:["A1","$A$1","A$1","$A1"], answer:1 }
      },

      { id:"f1", title:"SUMIF & SUMIFS", time:"6 min", level:"Intermediate",
        theory:`<div class="content-section"><h3>🎯 Conditional Summing — A Data Analyst's Best Friend</h3>

          <div class="formula-block"><div class="fb-label">SUMIF SYNTAX</div>=SUMIF(range, criteria, sum_range)</div>

          <div class="formula-block"><div class="fb-label">SUMIFS SYNTAX</div>=SUMIFS(sum_range, range1, crit1, range2, crit2, …)</div>
          <div class="formula-block"><div class="fb-label">EXAMPLE</div>=SUMIFS(C:C, B:B,"North", D:D,">1000")</div>
          <table class="excel-table"><tr><th></th><th>A</th><th>B</th><th>C</th></tr>

          <tr><td>4</td><td>Widget</td><td>North</td><td>4500</td></tr>
          <tr><td>5</td><td class="formula" colspan="2">=SUMIF(B2:B4,"North",C2:C4)</td><td class="highlight">9500</td></tr></table>
          <div class="tip-box"><div class="tip-icon">🔥</div>Use wildcards in criteria: <code>"North*"</code> matches anything starting with "North". Use <code>">"&E1</code> to reference a cell as criteria.</div></div>`,

  lookup: {
    label: "🔍 Lookups",

    lessons: [
      { id:"l1", title:"VLOOKUP Deep Dive", time:"8 min", level:"Intermediate",
        theory:`<div class="content-section"><h3>🔍 VLOOKUP — The Classic Lookup</h3>
          <p>VLOOKUP searches for a value in the <b>first column</b> of a table, then returns a value from a specified column.</p>
          <div class="formula-block"><div class="fb-label">SYNTAX</div>=VLOOKUP(lookup_value, table_array, col_index_num, [range_lookup])</div>
          <table class="excel-table"><tr><th></th><th>A</th><th>B</th><th>C</th><th>D</th></tr>
          <tr><td>1</td><td>EmpID</td><td>Name</td><td>Dept</td><td>Salary</td></tr>
          <tr><td>2</td><td>101</td><td>Arjun</td><td>Sales</td><td>45000</td></tr>
          <tr><td>3</td><td>102</td><td>Priya</td><td>IT</td><td>62000</td></tr>
          <tr><td>4</td><td>103</td><td>Rahul</td><td>HR</td><td>38000</td></tr></table>
          <div class="formula-block"><div class="fb-label">FIND SALARY FOR EMP 102</div>=VLOOKUP(102, A2:D4, 4, FALSE) → 62000</div>
          <p style="color:var(--text2);font-size:14px;margin-top:12px;">Parameters:<br>
          • <b>lookup_value</b>: what to search (102)<br>
          • <b>table_array</b>: the entire table (A2:D4)<br>
          • <b>col_index_num</b>: which column to return (4 = Salary)<br>
          • <b>range_lookup</b>: FALSE = exact match (always use FALSE!)</p>
          <div class="tip-box"><div class="tip-icon">⚠️</div><b>VLOOKUP limitations:</b> Can only look left-to-right. Breaks if you insert columns. For modern Excel, use XLOOKUP instead!</div></div>`,
        practice:{ type:"formula", q:"Look up Name (col 2) for EmpID in F2, from table A2:D100", answer:"=VLOOKUP(F2,A2:D100,2,FALSE)", hint:"4th arg = FALSE for exact match" }
      },
      { id:"l2", title:"INDEX + MATCH (Must Know 🔥)", time:"8 min", level:"Advanced",
        theory:`<div class="content-section"><h3>💪 INDEX + MATCH — The Power Combination</h3>
          <p>INDEX+MATCH is more flexible than VLOOKUP. It can look <b>left, right, up, down</b> and doesn't break when columns are inserted.</p>
          <div class="formula-block"><div class="fb-label">INDEX SYNTAX</div>=INDEX(return_range, row_number) → returns value at row</div>
          <div class="formula-block"><div class="fb-label">MATCH SYNTAX</div>=MATCH(lookup_value, lookup_range, 0) → returns position (0=exact)</div>
          <div class="formula-block"><div class="fb-label">COMBINED</div>=INDEX(return_col, MATCH(lookup_val, lookup_col, 0))</div>
          <div class="formula-block"><div class="fb-label">REAL EXAMPLE</div>=INDEX(D2:D100, MATCH(F2, A2:A100, 0))
→ Find salary where EmpID = F2</div>
          <div class="tip-box"><div class="tip-icon">🔥</div>INDEX+MATCH works both ways — you can look up by any column and return any column. <b>This is what senior analysts use.</b></div>
          <div class="content-section"><h3>🆕 XLOOKUP (Modern Excel)</h3>
          <div class="formula-block"><div class="fb-label">XLOOKUP</div>=XLOOKUP(F2, A2:A100, D2:D100, "Not Found")
→ Find salary, return "Not Found" if missing</div>
          <p style="color:var(--text2);font-size:14px;">XLOOKUP is cleaner and handles errors natively. Use it if your Excel version supports it (Office 365+).</p></div>`,
        practice:{ type:"formula", q:"Use INDEX+MATCH to find Dept (col C2:C100) where EmpID (A2:A100) = F2", answer:"=INDEX(C2:C100,MATCH(F2,A2:A100,0))", hint:"INDEX(return_range, MATCH(…))" }
      },
      { id:"l3", title:"HLOOKUP & 2D Lookup", time:"5 min", level:"Intermediate",
        theory:`<div class="content-section"><h3>↔️ HLOOKUP — Horizontal Lookup</h3>
          <p>HLOOKUP searches across the <b>first row</b> of a table (instead of first column like VLOOKUP).</p>
          <div class="formula-block"><div class="fb-label">SYNTAX</div>=HLOOKUP(lookup_value, table_array, row_index_num, FALSE)</div>
          <div class="content-section"><h3>📐 2D Lookup (Row + Column)</h3>
          <div class="formula-block"><div class="fb-label">2D LOOKUP</div>=INDEX(B2:E5, MATCH(H2,A2:A5,0), MATCH(H3,B1:E1,0))
→ Find value at intersection of row match and column match</div>
          <div class="tip-box"><div class="tip-icon">💡</div>2D lookup is extremely powerful for lookup tables (e.g., find price for a specific product in a specific month).</div></div>`,
        practice:{ type:"quiz", q:"HLOOKUP searches the lookup value in the ___ of the table?", opts:["First column","Last row","First row","Any column"], answer:2 }
      },
    ]

// ─── FLATTEN LESSONS ───
let allLessons = [];
Object.entries(curriculum).forEach(([cat, data]) => {
  data.lessons.forEach(l => { l.category = cat; allLessons.push(l); });
});

// ─── HINTS PER CATEGORY ───
const aiHints = {
  basics: ["What is a cell reference?","How do I freeze rows?","Explain AutoSum"],
  functions: ["Difference SUMIF vs SUMIFS?","How to count unique values?","Explain volatile functions"],
  lookup: ["VLOOKUP vs XLOOKUP?","How to do a 2-way lookup?","Why INDEX MATCH is better?"],
  logical: ["Nested IF best practice?","IFERROR vs IFNA?","How to use IFS?"],
  datetime: ["Calculate working days?","Difference DATEDIF units?","How to get quarter from date?"],
  cleaning: ["Handle #N/A errors?","Convert text dates?","Find & replace tips?"],
  pivot: ["Pivot table not updating?","How to add calculated field?","Group by month in pivot?"],
  charts: ["Best chart for comparison?","Secondary axis how-to?","Dynamic chart title?"],
  powerquery: ["Merge vs Append?","Unpivot use case?","Power Query vs formulas?"],
  vba: ["Difference Sub vs Function?","How to loop rows in VBA?","Error handling in VBA?"],
  projects: ["Dashboard checklist?","Present analysis in interview?","Variance analysis tips?"],
};

// ─── RENDER SIDEBAR ───
function renderSidebar(filter='') {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  let currentCat = null;
  allLessons.forEach(l => {
    if(filter && !l.title.toLowerCase().includes(filter.toLowerCase())) return;
    if(l.category !== currentCat) {
      currentCat = l.category;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = curriculum[l.category].label;
      list.appendChild(lbl);
    }
    const item = document.createElement('div');
    item.className = 'lesson-item' + (currentLesson?.id===l.id?' active':'') + (completedLessons.has(l.id)?' done':'');
    item.dataset.id = l.id;
    item.innerHTML = `<span class="li-icon">${getIcon(l.category)}</span>${l.title}
      ${completedLessons.has(l.id)?'<span class="li-check">✓</span>':''}`;
    item.onclick = ()=>loadLesson(l);
    list.appendChild(item);
  });
}

function getIcon(cat) {
  const m={basics:'📗',functions:'📘',lookup:'🔍',logical:'🧮',datetime:'📅',cleaning:'🧹',pivot:'📊',charts:'📈',powerquery:'⚡',vba:'🤖',projects:'🏆'};
  return m[cat]||'📄';
}

function filterLessons(v) { renderSidebar(v); }

// ─── LOAD LESSON ───
function loadLesson(l) {
  currentLesson = l;
  renderSidebar();
  const cat = curriculum[l.category];
  document.getElementById('lessonBreadcrumb').textContent = `${cat.label} → ${l.title}`;
  document.getElementById('lessonTitle').textContent = l.title;
  document.getElementById('lessonMeta').innerHTML =
    `<span class="meta-pill pill-blue">${l.level}</span>
     <span class="meta-pill pill-green">⏱ ${l.time}</span>
     ${completedLessons.has(l.id)?'<span class="meta-pill" style="background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)">✅ Completed</span>':''}`;
  document.getElementById('lessonBody').innerHTML = `<div class="fadein">${l.theory}</div>`;
  document.getElementById('lessonBody').scrollTop = 0;

  // render practice
  renderPractice(l);

  // update hints
  const hints = aiHints[l.category]||[];
  document.getElementById('aiHints').innerHTML = hints.map(h=>
    `<button class="hint-btn" onclick="askHint('${h.replace(/'/g,"\\'")}')">💬 ${h}</button>`
  ).join('');

  // open practice if not done
  if(!completedLessons.has(l.id) && !practiceOpen) togglePractice();

  // AI welcome
  pushAiMsg(`👋 Let's learn <b>${l.title}</b>! Read through the content, then try the practice below. Ask me anything!`, false, true);
}

// ─── PRACTICE ───
function renderPractice(l) {
  const pb = document.getElementById('practiceBody');
  const p = l.practice;
  if(!p) { pb.innerHTML='<p style="color:var(--text3);font-size:13px;">No exercise for this lesson.</p>'; return; }

  if(p.type==='quiz') {
    pb.innerHTML = `<div class="quiz-question">❓ ${p.q}</div>
      <div class="quiz-options">${p.opts.map((o,i)=>`<button class="quiz-opt" onclick="checkQuiz(this,${i},${p.answer})">${o}</button>`).join('')}</div>
      <div class="result-box" id="practiceResult"></div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="skipLesson()">Skip</button>
      </div>`;
  } else if(p.type==='formula') {
    pb.innerHTML = `<div class="quiz-question">✍️ ${p.q}</div>
      <div class="formula-input-wrap">
        <input class="formula-input" id="formulaInput" placeholder="=TYPE YOUR FORMULA HERE" />
        <button class="btn btn-accent" onclick="checkFormula()">Check ✓</button>
      </div>
      <div class="result-box" id="practiceResult"></div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="showHintMsg()">💡 Hint</button>
        <button class="btn btn-ghost" onclick="skipLesson()">Skip</button>
      </div>`;

    document.getElementById('formulaInput').addEventListener('keydown', e=>{
      if(e.key==='Enter') checkFormula();
    });
  }
}

function checkQuiz(btn, idx, answer) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.style.pointerEvents='none');
  const res = document.getElementById('practiceResult');
  if(idx===answer) {
    btn.classList.add('correct');
    res.className='result-box show ok';
    res.textContent='✅ Correct! Well done.';
    completeLesson();
  } else {
    btn.classList.add('wrong');
    opts[answer].classList.add('correct');
    res.className='result-box show fail';
    res.textContent=`❌ Not quite. The correct answer is: ${currentLesson.practice.opts[answer]}`;
    pushAiMsg(`That wasn't correct — the answer is <b>${currentLesson.practice.opts[answer]}</b>. Want me to explain why?`, false);
  }
}

function checkFormula() {
  const input = document.getElementById('formulaInput');
  const res = document.getElementById('practiceResult');
  const val = input.value.trim().toLowerCase().replace(/\s/g,'');
  const ans = currentLesson.practice.answer.toLowerCase().replace(/\s/g,'');
  if(val === ans) {
    res.className='result-box show ok';
    res.textContent='✅ Perfect formula! +25 XP';
    completeLesson();
  } else {
    res.className='result-box show fail';
    res.textContent=`❌ Not quite. Check your syntax. Hint: ${currentLesson.practice.hint}`;
    pushAiMsg(`Your formula doesn't match. Hint: <b>${currentLesson.practice.hint}</b>. Try again or ask me!`, false);
  }
}

function showHintMsg() {
  pushAiMsg(`💡 Hint for this exercise: <b>${currentLesson.practice.hint}</b>`, false);
}

function skipLesson() { completeLesson(false); }

function completeLesson(award=true) {
  if(!completedLessons.has(currentLesson.id)) {
    completedLessons.add(currentLesson.id);
    if(award) { xp += 25; streak += 1; }
    updateXP();
    renderSidebar();
    // update lesson meta
    document.getElementById('lessonMeta').innerHTML =
      `<span class="meta-pill pill-blue">${currentLesson.level}</span>
       <span class="meta-pill pill-green">⏱ ${currentLesson.time}</span>
       <span class="meta-pill" style="background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)">✅ Completed</span>`;
    if(award) pushAiMsg(`🎉 Excellent! +25 XP earned. You've completed <b>${completedLessons.size}</b> lesson${completedLessons.size>1?'s':''}. Keep going!`, false);
    // auto-advance
    setTimeout(autoAdvance, 1200);
  }
}

function autoAdvance() {
  const idx = allLessons.findIndex(l=>l.id===currentLesson.id);
  if(idx < allLessons.length-1) {
    const next = allLessons[idx+1];
    // show next button
    const pb = document.getElementById('practiceBody');
    const nextBtn = document.createElement('div');
    nextBtn.style.marginTop='10px';
    nextBtn.innerHTML=`<button class="btn btn-accent" onclick="loadLesson(allLessons[${idx+1}])">Next: ${next.title} →</button>`;
    pb.appendChild(nextBtn);
  }
}

// ─── PROGRESS ───
function updateXP() {
  document.getElementById('xpBadge').textContent = `⚡ ${xp} XP`;
  document.getElementById('streakBadge').textContent = `🔥 ${streak} streak`;
  const pct = Math.round((completedLessons.size / allLessons.length)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
}

// ─── TABS ───
function switchTab(btn, cat) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // load first lesson of category
  const first = allLessons.find(l=>l.category===cat);
  if(first) loadLesson(first);
}

// ─── PRACTICE TOGGLE ───
function togglePractice() {
  practiceOpen = !practiceOpen;
  const pb = document.getElementById('practiceBody');
  const tog = document.getElementById('practiceToggle');
  pb.classList.toggle('open', practiceOpen);
  tog.textContent = practiceOpen ? '▼ CLOSE' : '▲ OPEN';
}

// ─── AI TUTOR ───
let aiConversation = [];

function pushAiMsg(text, isUser=false, clear=false) {
  const box = document.getElementById('aiMessages');
  if(clear) box.innerHTML='';
  const div = document.createElement('div');
  div.className = 'msg fadein ' + (isUser?'msg-user':'msg-ai');
  div.innerHTML = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = 'msg-typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendAiMessage() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  pushAiMsg(text, true);

  const context = currentLesson
    ? `The student is on lesson: "${currentLesson.title}" in the "${curriculum[currentLesson.category].label}" section of an Excel learning platform for data analysts. `
    : 'The student is on an Excel learning platform for data analysts. ';

  aiConversation.push({ role:'user', content: context + text });

  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are an expert Excel tutor for data analysts. Be concise (max 3-4 sentences), practical, and use examples. Format with <code> for formulas/functions. Use <b> for key terms. Focus on interview-relevant knowledge. Encourage the student!`,
        messages: aiConversation.slice(-6)
      })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.content?.[0]?.text || "Let me explain that differently! Can you rephrase your question?";
    aiConversation.push({ role:'assistant', content: reply });
    pushAiMsg(reply, false);
  } catch(e) {
    hideTyping();
    pushAiMsg("I'm having trouble connecting. Please check your internet and try again!", false);
  }
}

function askHint(h) {
  document.getElementById('aiInput').value = h;
  sendAiMessage();
}

function handleAiKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendAiMessage(); }
}

// ─── INIT ───
renderSidebar();
const firstLesson = allLessons[0];
loadLesson(firstLesson);

// Welcome AI message
setTimeout(()=>{
  pushAiMsg(`👋 Hi! I'm your <b>Excel AI Tutor</b>. Ask me anything about Excel — formulas, shortcuts, concepts, or how to solve a problem. I'm here to help you ace that data analyst interview! 🚀`, false, true);
}, 300);
</script>
